name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Show Go version
        run: go version

      - name: Check formatting
        run: |
          git ls-files -z '*.go' > /tmp/kua-go-files
          test -s /tmp/kua-go-files
          test -z "$(xargs -0 gofmt -l < /tmp/kua-go-files)"

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build CLI
        run: go build -o /tmp/kua ./cmd/kua

      - name: Check JSON syntax
        run: |
          git ls-files -z 'schemas/**/*.json' 'schemas/*.json' > /tmp/kua-json-files
          test -s /tmp/kua-json-files
          xargs -0 jq empty < /tmp/kua-json-files
